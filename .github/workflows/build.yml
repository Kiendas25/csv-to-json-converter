name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: macos
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas pyyaml
      
      - name: Build executable (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          pyinstaller --onefile --name csv2json-${{ matrix.platform }}-${{ matrix.arch }} csv_to_json_converter.py
      
      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller --onefile --name csv2json-${{ matrix.platform }}-${{ matrix.arch }}.exe csv_to_json_converter.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv2json-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}